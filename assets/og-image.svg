<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#15293f"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="34%" r="46%">
      <stop offset="0" stop-color="#00c8b4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00c8b4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4d2de"/><stop offset=".14" stop-color="#ffffff"/>
      <stop offset=".5" stop-color="#dde7ef"/><stop offset=".86" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bcccd9"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9d4e0"/><stop offset=".25" stop-color="#eef3f8"/>
      <stop offset=".55" stop-color="#c9d4e0"/><stop offset=".8" stop-color="#eef3f8"/>
      <stop offset="1" stop-color="#c9d4e0"/>
