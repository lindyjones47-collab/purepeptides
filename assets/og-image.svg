  <text x="214" y="248" font-family="Arial,Helvetica,sans-serif" font-size="20" letter-spacing="4" fill="#6b8298">RESEARCH GRADE &#183; EST. 2012</text>

  <!-- Headline -->
  <text x="96" y="372" font-family="Georgia,serif" font-size="78" font-weight="bold" fill="#ffffff">Research-Grade Peptides</text>
  <text x="96" y="446" font-family="Arial,Helvetica,sans-serif" font-size="34" fill="#aebccb">&#62;99% purity &#183; lyophilised &#183; tracked UK &amp; EU delivery</text>

  <!-- Trust chips -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold">
