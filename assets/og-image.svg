      <text x="60" y="165" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#ffffff">Pure<tspan fill="#00c8b4">Peptides</tspan></text>
      <text x="28" y="192" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0d1b2a">RESEARCH</text>
      <text x="28" y="206" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0077b6">&#62;99%</text>
