    <text x="212" y="536" text-anchor="middle" fill="#00c8b4">&#62;99% PURITY</text>
    <rect x="348" y="500" width="270" height="56" rx="10" fill="rgba(0,119,182,0.16)" stroke="#2e9cdb" stroke-width="1.5"/>
    <text x="483" y="536" text-anchor="middle" fill="#9fd0ee">SAME-DAY DISPATCH</text>
    <rect x="638" y="500" width="300" height="56" rx="10" fill="rgba(255,255,255,0.06)" stroke="#3a4a5c" stroke-width="1.5"/>
    <text x="788" y="536" text-anchor="middle" fill="#aebccb">RESEARCH USE ONLY</text>
