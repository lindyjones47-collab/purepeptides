    <path d="M22 70 q0 -6 6 -6 h64 q6 0 6 6 v210 q0 20 -20 20 h-36 q-20 0 -20 -20 z" fill="url(#glass)" stroke="#b3c3d1" stroke-width="1.5"/>
    <path d="M28 250 q32 -12 64 0 v22 q-32 10 -64 0 z" fill="#ffffff"/>
    <rect x="34" y="40" width="52" height="30" rx="4" fill="#2b2f36"/>
